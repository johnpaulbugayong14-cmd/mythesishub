<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Task Management System</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✓</text></svg>">
</head>
<body>

<div class="container">
  <div class="card" style="max-width: 460px; margin: 0 auto;">
    <h1>Sign In</h1>
    <p style="text-align:center; color:#94a3b8; margin-bottom:1.5rem;">Enter your registered email and password to continue.</p>

    <form onsubmit="event.preventDefault(); login();">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password" required>
      </div>

      <div id="loginMessage" class="alert" style="display:none;"></div>
      <button type="submit">Continue</button>
    </form>
  </div>
</div>

<footer style="text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.8rem; margin-top: 2rem;">
  task assignment system for thesis
</footer>

<script type="module" src="auth.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
