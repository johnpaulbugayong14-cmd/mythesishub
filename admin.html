<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - mytaskForThesisHub</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1 style="margin: 0;">📊 Admin Dashboard</h1>
    <button onclick="signOutUser()" style="background: #dc2626; color: white; border: none; padding: 0.25rem 0.5rem; border-radius: 0.375rem; cursor: pointer; font-size: 0.75rem;">Logout</button>
  </div>
  
  <div class="card">
    <h2>Create New Task</h2>
    
    <form onsubmit="event.preventDefault(); createTask();">
      <div class="form-row">
        <div class="form-group">
          <label for="title">Task Title</label>
          <input id="title" type="text" placeholder="Enter task title" required>
        </div>
        
        <div class="form-group">
          <label for="deadline">Deadline</label>
          <input id="deadline" type="date" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Enter task description" rows="4"></textarea>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="assignedTo">Assign To</label>
          <select id="assignedTo" required>
            <option value="">Select a member</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="linkInput">Link</label>
          <input id="linkInput" type="url" placeholder="https://example.com/resource" autocomplete="off">
          <p style="font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem;">Optional: add a reference link for this task.</p>
        </div>
      </div>
      
      <button type="submit" class="btn-success">✓ Create Task</button>
    </form>
  </div>
  
  <div class="card">
    <h2>Create New Poll</h2>
    
    <form onsubmit="event.preventDefault(); createPoll();">
      <div class="form-group">
        <label for="pollQuestion">Poll Question</label>
        <input id="pollQuestion" type="text" placeholder="Enter poll question" required>
      </div>
      
      <div id="pollOptions">
        <div class="form-group">
          <label>Option 1</label>
          <input type="text" class="poll-option-input" placeholder="Enter option" required>
        </div>
        <div class="form-group">
          <label>Option 2</label>
          <input type="text" class="poll-option-input" placeholder="Enter option" required>
        </div>
      </div>
      
      <button type="button" onclick="addPollOption()" style="background: #6b7280; margin-bottom: 1rem;">+ Add Option</button>
      <button type="submit" class="btn-secondary">📊 Create Poll</button>
    </form>
  </div>
  
  <div class="card">
    <h2>Create Announcement</h2>
    
    <form onsubmit="event.preventDefault(); createAnnouncement();">
      <div class="form-group">
        <label for="announcementTitle">Title</label>
        <input id="announcementTitle" type="text" placeholder="Enter announcement title" required>
      </div>
      
      <div class="form-group">
        <label for="announcementContent">Content</label>
        <textarea id="announcementContent" placeholder="Enter announcement content" rows="6" required></textarea>
      </div>
      
      <button type="submit" class="btn-warning">📢 Create Announcement</button>
    </form>
  </div>
  
  <div class="card">
    <h2>📈 Task Analytics</h2>
    <canvas id="taskChart"></canvas>
  </div>
  
  <div class="card">
    <h2>📋 All Tasks</h2>
    <div id="tasks"></div>
  </div>
</div>

<footer style="text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.8rem; margin-top: 2rem;">
  task assignment system for thesis
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
  import { requireAuth } from "./auth.js";
  requireAuth(['admin']);
</script>
<script type="module" src="admin.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
